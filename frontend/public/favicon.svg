<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7BC15A"/>
      <stop offset="100%" stop-color="#4A9030"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="112" fill="white" opacity="0.06"/>
  <!-- Map pin -->
  <g filter="url(#shadow)">
    <path d="M256 72c-66.3 0-120 53.7-120 120 0 30 12 63 32 96 20 33 46 66 68 92 4.8 5.7 8.8 10.7 12 14.8 2.4 3.2 6.8 3.2 9.2 0 3.2-4.1 7.2-9.1 12-14.8 22-26 48-59 68-92 20-33 32-66 32-96 0-66.3-53.7-120-120-120z" fill="white" opacity="0.95"/>
  </g>
  <!-- Play button circle -->
  <circle cx="256" cy="192" r="56" fill="url(#bg)"/>
  <!-- Play triangle -->
  <path d="M240 166v52l44-26z" fill="white"/>
</svg>
